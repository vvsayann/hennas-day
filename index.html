<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You my shoni❤️</title>
<style>
body{
margin:0;
font-family:'Segoe UI',sans-serif;
background: linear-gradient(135deg,#ffdde1,#ee9ca7,#ffd1dc);
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
text-align:center;
cursor: url('cursor.cur') 16 16, auto;
color:#333;
transition:0.4s;
opacity:1;
}
.fade-out{
opacity:0;
}
.box{
background:rgba(255,255,255,0.3);
padding:30px;
border-radius:25px;
backdrop-filter:blur(10px);
box-shadow:0 10px 40px rgba(0,0,0,0.2);
max-width:400px;
width:90%;
}
.glow{
color:#ff3d6e;
text-shadow:0 0 10px #ff4d6d,0 0 20px #ff4d6d;
}
button{
margin-top:12px;
padding:12px;
border:none;
background:#ff4d6d;
color:white;
border-radius:25px;
cursor:pointer;
width:100%;
font-size:15px;
}
#continueBtn{
opacity:0.5;
pointer-events:none;
}
#yesBtn{
width:80px;
height:80px;
border-radius:50%;
border:2px solid #ff4d6d;
background:transparent;
color:#ff4d6d;
font-size:16px;
margin:auto;
display:block;
}
#giftBox{
display:none;
font-size:60px;
margin-top:20px;
cursor:pointer;
animation: bounce 1s infinite alternate;
}
@keyframes bounce{
from{transform:translateY(0);}
to{transform:translateY(-10px);}
}
#cake{
display:none;
margin-top:20px;
animation: pop 0.5s ease;
}
#cake img{
width:180px;
border-radius:15px;
}
@keyframes pop{
0%{transform:scale(0);}
100%{transform:scale(1);}
}
</style>
</head>
<body>

<audio id="bgmusic" loop>
<source src="song.mp3" type="audio/mp3">
</audio>

<div class="box">
<h1 class="glow">Are you ready for your birthday surprise? 💖</h1>

<button id="yesBtn">Yes</button>

<div id="giftBox">🎁</div>

<div id="cake">
<img src="cake.gif">
<h2 class="glow">Happy Birthday PRETTY LITTLE BABY ❤️</h2>
</div>

<button id="musicBtn" onclick="toggleMusic()">Play Music 🎵</button>

<button id="continueBtn" onclick="goNext()">Continue ➡️</button>
</div>

<script>
const music=document.getElementById("bgmusic");
const musicBtn=document.getElementById("musicBtn");
const continueBtn=document.getElementById("continueBtn");

function toggleMusic(){
if(music.paused){
music.volume=0.2;
music.play();
musicBtn.innerText="Pause Music 🎵";
}else{
music.pause();
musicBtn.innerText="Play Music 🎵";
}
}

function goNext(){
document.body.classList.add("fade-out");
setTimeout(()=>{
window.location.href="page1.html";
},500);
}

const yesBtn=document.getElementById("yesBtn");
const giftBox=document.getElementById("giftBox");
const cake=document.getElementById("cake");

yesBtn.onclick=function(){
yesBtn.style.display="none";
giftBox.style.display="block";
};

giftBox.onclick=function(){
giftBox.style.display="none";
cake.style.display="block";

/* unlock continue */
continueBtn.style.opacity="1";
continueBtn.style.pointerEvents="auto";
};

document.addEventListener("mousemove",function(e){
let heart=document.createElement("div");
heart.innerHTML="💖";
heart.style.position="fixed";
heart.style.left=e.clientX+"px";
heart.style.top=e.clientY+"px";
heart.style.pointerEvents="none";
heart.style.transition="0.6s";
document.body.appendChild(heart);
setTimeout(()=>{
heart.style.transform="translateY(-20px)";
heart.style.opacity="0";
},10);
setTimeout(()=>heart.remove(),600);
});
</script>

</body>
</html>
